version: "2"
sql:
  - schema: "migrations"
    queries: "internal/repository/user/sql/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/user/driver/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true

